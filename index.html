<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monsoon Impact</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@600&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/vega@5.25.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5.6.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6.22.0"></script>


    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body{
            font-family: "Inter", sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
        }
        .wrapper{
            align-items: center;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            width: fit-content;
        }
        .card-row{
            display: flex;
            gap: 24px;
            justify-content: center;
        }

        #vis-map, #vis-bar,
        #vis-grouped, #vis-slope {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <div id="vis-map"></div>
        </div>

        <div class="card">
            <div id="vis-bar"></div>
        </div>

        <div class="card-row">
            <div class="card">
                <div id="vis-grouped"></div>
            </div>
            <div class="card">
                <div id="vis-slope"></div>
            </div>
        </div>
        
    </div>

    <script>
        vegaEmbed('#vis-map', 'flood_loss_agricultural_map.vg.json', {actions: false})
        .then(result => console.log("Map rendered sucessfully"))
        .catch(console.error);

        vegaEmbed('#vis-bar', 'flood_loss_agricultural_stacked_bar_chart.vg.json', {actions: false})
        .then(result => console.log("Bar chart rendered successfully"))
        .catch(console.error);

        vegaEmbed('#vis-grouped', 'flood_loss_agricultural_grouped_bar_chart.vg.json', {actions:false})
        .then(result => console.log("Grouped bar rendered successfully"))
        .catch(console.error);

        vegaEmbed('#vis-slope', 'flood_loss_agricultural_slope_chart.vg.json', {actions: false})
        .then(result => console.log("Slope chart rendered successfully"))
        .catch(console.error);
    </script>
    
</body>
</html>
