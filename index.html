<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monsoon Impact</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@600&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/vega@5.25.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5.6.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6.22.0"></script>


    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body{
            font-family: "Inter", sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
        }
        .wrapper{
            align-items: center;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            width: fit-content;
        }
        .card-row{
            display: flex;
            gap: 24px;
            justify-content: center;
        }
        .page-header{
            width: 1000px;
            padding: 12px 0;
        }
        .page-header h1{
            font-family: "Lora", serif;
            font-size: 36px;
            font-weight: 750;
            color: "black";
            line-height: 1.25;
            text-shadow: 3px 3px 5px rgba(0, 0, 0, 0.4);
            margin-bottom: 12px;
        }


        #vis-map, #vis-bar, #vis-rainfall,
        #vis-grouped, #vis-slope {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="page-header">
            <h1>· How Monsoon Floods Are Affecting Malaysia's Economy ·</h1>
        </div>

        <div class="card">
            <div id="vis-rainfall"></div>
        </div>

        <div class="card">
            <div id="vis-lollipop-donut"></div>
        </div>

        <div class="card">
            <div id="vis-map"></div>
        </div>

        <div class="card">
            <div id="vis-bar"></div>
        </div>

        <div class="card">
            <div id="vis-combined"></div>
        </div>
        </div>
        
    </div>

    <script>
        vegaEmbed('#vis-rainfall', 'rainfall_overview_detail.vg.json', {actions:false})
        .then(result => console.log("Rainfall chart rendered successfully"))
        .catch(console.error);

        vegaEmbed('#vis-lollipop-donut', 'flood_loss_all_lollipop_donut.vg.json', {actions:false})
        .then(result => console.log("Lollipop and donut chart rendered successfully"))
        .catch(console.error);

        vegaEmbed('#vis-map', 'flood_loss_agricultural_map.vg.json', {actions: false})
        .then(result => console.log("Map rendered sucessfully"))
        .catch(console.error);

        vegaEmbed('#vis-bar', 'flood_loss_agricultural_stacked_bar_chart.vg.json', {actions: false})
        .then(result => console.log("Bar chart rendered successfully"))
        .catch(console.error);

        vegaEmbed('#vis-combined', 'flood_loss_agricultural_grouped_slope_chart.vg.json', {actions:false})
        .then(result => console.log("Combined grouped bar and slope chart rendered successfully"))
        .catch(console.error);
    </script>
    
</body>
</html>
